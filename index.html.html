<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1a2744">
<title>Birou Traduceri</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #1a2744; --navy-light: #243358; --gold: #c9973a; --gold-light: #e8b86d;
    --cream: #f5f0e8; --cream-dark: #ede7d9; --text: #1a1a2e; --text-muted: #6b7280;
    --success: #166534; --white: #ffffff; --shadow: 0 4px 24px rgba(26,39,68,0.12); --radius: 16px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: 'DM Sans', sans-serif; background: var(--cream); color: var(--text); min-height: 100vh; padding-bottom: 110px; }

  /* LOGIN */
  #login-screen { position: fixed; inset: 0; background: var(--navy); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; padding: 32px; }
  .login-logo { font-family: 'DM Serif Display', serif; font-size: 28px; color: var(--gold); text-align: center; margin-bottom: 8px; }
  .login-sub { font-size: 13px; color: rgba(255,255,255,0.5); text-align: center; margin-bottom: 48px; }
  .login-card { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: var(--radius); padding: 28px 24px; width: 100%; max-width: 340px; }
  .login-label { font-size: 12px; font-weight: 500; color: rgba(255,255,255,0.6); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 10px; display: block; }
  .login-input { width: 100%; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); border-radius: 10px; padding: 14px 16px; font-size: 18px; color: white; font-family: 'DM Sans', sans-serif; letter-spacing: 3px; outline: none; }
  .login-input:focus { border-color: var(--gold); }
  .login-input::placeholder { letter-spacing: 1px; color: rgba(255,255,255,0.25); font-size: 14px; }
  .login-btn { width: 100%; margin-top: 20px; background: var(--gold); color: var(--navy); border: none; border-radius: 10px; padding: 15px; font-size: 15px; font-weight: 600; font-family: 'DM Sans', sans-serif; cursor: pointer; }
  .login-error { margin-top: 12px; text-align: center; font-size: 13px; color: #fca5a5; display: none; }

  /* HEADER */
  .app-header { background: var(--navy); padding: 20px 20px 16px; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 20px rgba(26,39,68,0.3); }
  .header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .app-title { font-family: 'DM Serif Display', serif; font-size: 20px; color: var(--gold); }
  .logout-btn { background: rgba(255,255,255,0.1); border: none; border-radius: 8px; padding: 8px 12px; color: rgba(255,255,255,0.7); font-size: 12px; font-weight: 500; cursor: pointer; font-family: 'DM Sans', sans-serif; }
  .tabs { display: flex; gap: 6px; }
  .tab { flex: 1; padding: 9px 6px; background: rgba(255,255,255,0.08); border: none; border-radius: 9px; color: rgba(255,255,255,0.5); font-size: 12px; font-weight: 500; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all 0.2s; }
  .tab.active { background: var(--gold); color: var(--navy); font-weight: 600; }

  .content { padding: 20px 16px; }
  .section { display: none; }
  .section.active { display: block; }

  /* CARDS */
  .card { background: white; border-radius: var(--radius); padding: 20px; margin-bottom: 16px; box-shadow: var(--shadow); }
  .card-title { font-family: 'DM Serif Display', serif; font-size: 17px; color: var(--navy); margin-bottom: 16px; }

  /* DATE STRIP */
  .date-strip { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
  .dsb { background: white; border: 1.5px solid #e5e7eb; border-radius: 10px; padding: 10px 16px; font-size: 20px; cursor: pointer; line-height: 1; }
  .date-label { flex: 1; text-align: center; font-size: 14px; font-weight: 600; color: var(--navy); background: white; border-radius: 10px; padding: 12px 8px; box-shadow: var(--shadow); cursor: pointer; line-height: 1.3; }
  #hidden-date { position: fixed; opacity: 0; pointer-events: none; top: -100px; }

  /* DAY SUMMARY */
  .day-summary { background: var(--navy); border-radius: var(--radius); padding: 16px 20px; margin-bottom: 16px; display: flex; justify-content: space-around; align-items: center; }
  .ds-item { text-align: center; }
  .ds-value { font-family: 'DM Serif Display', serif; font-size: 22px; color: var(--gold); }
  .ds-label { font-size: 10px; color: rgba(255,255,255,0.5); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 3px; }
  .ds-divider { width: 1px; height: 36px; background: rgba(255,255,255,0.1); }

  /* FORM */
  .form-group { margin-bottom: 14px; }
  .form-label { display: block; font-size: 12px; font-weight: 500; color: var(--text-muted); letter-spacing: 0.5px; text-transform: uppercase; margin-bottom: 7px; }
  .form-input { width: 100%; border: 1.5px solid #e5e7eb; border-radius: 10px; padding: 13px 14px; font-size: 16px; font-family: 'DM Sans', sans-serif; color: var(--text); outline: none; transition: border-color 0.2s; background: var(--cream); }
  .form-input:focus { border-color: var(--gold); background: white; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  .venit-preview { background: var(--navy); border-radius: 12px; padding: 14px 18px; display: flex; align-items: center; justify-content: space-between; }
  .vp-label { font-size: 11px; color: rgba(255,255,255,0.5); text-transform: uppercase; letter-spacing: 0.5px; }
  .vp-amount { font-family: 'DM Serif Display', serif; font-size: 26px; color: var(--gold); }

  .add-btn { width: 100%; padding: 15px; background: var(--gold); color: var(--navy); border: none; border-radius: 12px; font-size: 15px; font-weight: 700; font-family: 'DM Sans', sans-serif; cursor: pointer; margin-top: 12px; transition: transform 0.1s; }
  .add-btn:active { transform: scale(0.98); }

  /* CLIENT ENTRIES */
  .client-row { display: flex; align-items: center; padding: 12px 0; border-bottom: 1px solid var(--cream-dark); gap: 10px; }
  .client-row:last-child { border-bottom: none; }
  .cr-num { width: 30px; height: 30px; background: var(--cream); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 12px; color: var(--navy); flex-shrink: 0; }
  .cr-info { flex: 1; }
  .cr-main { font-size: 14px; font-weight: 600; color: var(--text); }
  .cr-sub { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
  .cr-amount { font-family: 'DM Serif Display', serif; font-size: 17px; color: var(--navy); white-space: nowrap; }
  .cr-del { background: #fee2e2; border: none; border-radius: 8px; padding: 7px 9px; color: #dc2626; cursor: pointer; font-size: 14px; flex-shrink: 0; }

  /* MONTHLY */
  .month-nav { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
  .mnb { background: white; border: 1.5px solid #e5e7eb; border-radius: 10px; padding: 10px 16px; font-size: 20px; cursor: pointer; }
  .mnl { flex: 1; text-align: center; font-family: 'DM Serif Display', serif; font-size: 17px; color: var(--navy); background: white; border-radius: 10px; padding: 10px; box-shadow: var(--shadow); }

  .monthly-stats { background: var(--navy); border-radius: var(--radius); padding: 16px; margin-bottom: 16px; display: grid; grid-template-columns: repeat(4,1fr); gap: 6px; }
  .ms-item { text-align: center; }
  .ms-val { font-family: 'DM Serif Display', serif; font-size: 20px; color: var(--gold); }
  .ms-lbl { font-size: 9px; color: rgba(255,255,255,0.5); text-transform: uppercase; letter-spacing: 0.3px; margin-top: 3px; }

  .day-block { margin-bottom: 8px; }
  .day-hdr { display: flex; justify-content: space-between; align-items: center; padding: 8px 12px; background: var(--cream-dark); border-radius: 8px; }
  .dh-left { font-weight: 600; font-size: 13px; color: var(--navy); }
  .dh-right { font-family: 'DM Serif Display', serif; font-size: 15px; color: var(--gold); }
  .day-clients-wrap { padding: 0 4px; }

  /* ANNUAL */
  .annual-row { display: flex; align-items: center; padding: 11px 0; border-bottom: 1px solid var(--cream-dark); }
  .annual-row:last-child { border-bottom: none; }
  .ar-name { font-size: 13px; font-weight: 500; color: var(--text); width: 80px; flex-shrink: 0; }
  .ar-bar-wrap { flex: 1; height: 6px; background: var(--cream-dark); border-radius: 3px; margin: 0 10px; }
  .ar-bar { height: 100%; border-radius: 3px; background: var(--gold); }
  .ar-amt { font-family: 'DM Serif Display', serif; font-size: 14px; color: var(--navy); min-width: 80px; text-align: right; }

  .grand-box { background: var(--navy); border-radius: 12px; padding: 16px 20px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
  .gb-label { font-size: 12px; color: rgba(255,255,255,0.5); text-transform: uppercase; letter-spacing: 0.5px; }
  .gb-val { font-family: 'DM Serif Display', serif; font-size: 26px; color: var(--gold); }

  .empty-state { text-align: center; padding: 36px 20px; color: var(--text-muted); }
  .ei { font-size: 36px; margin-bottom: 10px; }
  .et { font-size: 14px; line-height: 1.5; }

  /* TOAST */
  .toast { position: fixed; bottom: 115px; left: 50%; transform: translateX(-50%) translateY(16px); background: var(--success); color: white; padding: 11px 22px; border-radius: 100px; font-size: 14px; font-weight: 500; opacity: 0; transition: all 0.25s; pointer-events: none; white-space: nowrap; z-index: 500; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-logo">📜 Birou de Traduceri</div>
  <div class="login-sub">Registru de activitate</div>
  <div class="login-card">
    <label class="login-label">Parolă de acces</label>
    <input class="login-input" type="password" id="pwd-input" placeholder="Introduceți parola" maxlength="30">
    <button class="login-btn" onclick="checkLogin()">Intră în aplicație →</button>
    <div class="login-error" id="login-error">⚠ Parolă incorectă.</div>
  </div>
</div>

<div class="toast" id="toast">✓ Client adăugat!</div>
<input type="date" id="hidden-date" onchange="onDatePick()">

<!-- HEADER -->
<div class="app-header" id="app-header" style="display:none">
  <div class="header-top">
    <div class="app-title">📜 Birou Traduceri</div>
    <button class="logout-btn" onclick="logout()">Ieșire</button>
  </div>
  <div class="tabs">
    <button class="tab active" onclick="switchTab('azi',this)">📋 Azi</button>
    <button class="tab" onclick="switchTab('lunar',this)">📅 Lunar</button>
    <button class="tab" onclick="switchTab('anual',this)">📊 Anual</button>
  </div>
</div>

<div class="content" id="app-content" style="display:none">

  <!-- AZI -->
  <div class="section active" id="section-azi">
    <div class="date-strip">
      <button class="dsb" onclick="changeDay(-1)">‹</button>
      <div class="date-label" id="date-label" onclick="document.getElementById('hidden-date').showPicker&&document.getElementById('hidden-date').showPicker()">—</div>
      <button class="dsb" onclick="changeDay(1)">›</button>
    </div>

    <div class="day-summary" id="day-summary"></div>

    <div class="card">
      <div class="card-title">➕ Client nou</div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Nr. Pagini</label>
          <input class="form-input" type="number" id="inp-pagini" placeholder="0" min="0" step="0.5" oninput="updatePreview()">
        </div>
        <div class="form-group">
          <label class="form-label">Tarif / Pagină</label>
          <input class="form-input" type="number" id="inp-tarif" placeholder="RON" min="0" step="0.5" oninput="updatePreview()">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Limbă / Notă (opțional)</label>
        <input class="form-input" type="text" id="inp-nota" placeholder="ex: RO → EN, RO → DE...">
      </div>
      <div class="venit-preview">
        <div class="vp-label">Venit client</div>
        <div class="vp-amount" id="venit-preview">0 RON</div>
      </div>
      <button class="add-btn" onclick="saveClient()">➕ Adaugă client</button>
    </div>

    <div class="card">
      <div class="card-title" id="clients-title">Clienți</div>
      <div id="clients-list"></div>
    </div>
  </div>

  <!-- LUNAR -->
  <div class="section" id="section-lunar">
    <div class="month-nav">
      <button class="mnb" onclick="changeMonth(-1)">‹</button>
      <div class="mnl" id="month-label">—</div>
      <button class="mnb" onclick="changeMonth(1)">›</button>
    </div>
    <div class="monthly-stats" id="monthly-stats"></div>
    <div class="card">
      <div class="card-title">📋 Activitate pe zile</div>
      <div id="monthly-list"></div>
    </div>
  </div>

  <!-- ANUAL -->
  <div class="section" id="section-anual">
    <div class="card">
      <div class="card-title">📊 Sumar <span id="year-label"></span></div>
      <div class="grand-box" id="grand-box"></div>
      <div id="annual-list"></div>
    </div>
  </div>
</div>

<script>
const PASSWORD = "traduceri2026";
const KEY = "bt_v3";

function checkLogin() {
  if (document.getElementById("pwd-input").value === PASSWORD) {
    sessionStorage.setItem("bt_auth","1");
    document.getElementById("login-screen").style.display = "none";
    document.getElementById("app-header").style.display = "block";
    document.getElementById("app-content").style.display = "block";
    initApp();
  } else {
    document.getElementById("login-error").style.display = "block";
    document.getElementById("pwd-input").value = "";
  }
}
document.getElementById("pwd-input").addEventListener("keydown", e => { if(e.key==="Enter") checkLogin(); });
function logout() { sessionStorage.removeItem("bt_auth"); location.reload(); }

function getData() { try { return JSON.parse(localStorage.getItem(KEY)) || []; } catch { return []; } }
function setData(a) { localStorage.setItem(KEY, JSON.stringify(a)); }

let selDate, curMonth, curYear;

function todayStr() { return new Date().toISOString().split("T")[0]; }

function initApp() {
  const now = new Date();
  selDate  = todayStr();
  curMonth = now.getMonth();
  curYear  = now.getFullYear();
  document.getElementById("hidden-date").value = selDate;
  refreshAll();
}

function refreshAll() {
  updateDateLabel();
  renderDay();
  renderMonthly();
  renderAnnual();
}

// Date nav
function changeDay(d) {
  const dt = new Date(selDate + "T12:00:00");
  dt.setDate(dt.getDate() + d);
  selDate = dt.toISOString().split("T")[0];
  document.getElementById("hidden-date").value = selDate;
  updateDateLabel();
  renderDay();
}
function onDatePick() {
  selDate = document.getElementById("hidden-date").value;
  updateDateLabel();
  renderDay();
}
function updateDateLabel() {
  const d = new Date(selDate + "T12:00:00");
  let lbl = d.toLocaleDateString("ro-RO", { weekday:"long", day:"numeric", month:"long", year:"numeric" });
  lbl = lbl.charAt(0).toUpperCase() + lbl.slice(1);
  if (selDate === todayStr()) lbl = "📅 Astăzi";
  document.getElementById("date-label").textContent = lbl;
}

// Preview
function updatePreview() {
  const p = parseFloat(document.getElementById("inp-pagini").value) || 0;
  const t = parseFloat(document.getElementById("inp-tarif").value) || 0;
  document.getElementById("venit-preview").textContent = ron(p * t);
}

// Save
function saveClient() {
  const pagini = parseFloat(document.getElementById("inp-pagini").value) || 0;
  const tarif  = parseFloat(document.getElementById("inp-tarif").value) || 0;
  const nota   = document.getElementById("inp-nota").value.trim();
  if (!pagini) { alert("Introduceți numărul de pagini!"); return; }
  if (!tarif)  { alert("Introduceți tariful pe pagină!"); return; }
  const data = getData();
  data.push({ id: Date.now(), data: selDate, pagini, tarif, venit: pagini * tarif, nota });
  setData(data);
  showToast();
  document.getElementById("inp-pagini").value = "";
  document.getElementById("inp-tarif").value  = "";
  document.getElementById("inp-nota").value   = "";
  document.getElementById("venit-preview").textContent = "0 RON";
  refreshAll();
}

function delClient(id) {
  if (!confirm("Ștergeți acest client?")) return;
  setData(getData().filter(c => c.id !== id));
  refreshAll();
}

// Render Day
function renderDay() {
  const clients = getData().filter(c => c.data === selDate);
  const totPag  = clients.reduce((s,c) => s + c.pagini, 0);
  const totVen  = clients.reduce((s,c) => s + c.venit, 0);

  document.getElementById("day-summary").innerHTML = `
    <div class="ds-item"><div class="ds-value">${clients.length}</div><div class="ds-label">Clienți</div></div>
    <div class="ds-divider"></div>
    <div class="ds-item"><div class="ds-value">${totPag}</div><div class="ds-label">Pagini</div></div>
    <div class="ds-divider"></div>
    <div class="ds-item"><div class="ds-value" style="font-size:18px">${ron(totVen)}</div><div class="ds-label">Venit zi</div></div>
  `;

  document.getElementById("clients-title").textContent =
    clients.length ? `Clienți adăugați (${clients.length})` : "Clienți adăugați";

  const el = document.getElementById("clients-list");
  if (!clients.length) {
    el.innerHTML = `<div class="empty-state"><div class="ei">👤</div><div class="et">Niciun client pentru această zi.<br>Adăugați primul client!</div></div>`;
    return;
  }
  el.innerHTML = clients.map((c,i) => `
    <div class="client-row">
      <div class="cr-num">${i+1}</div>
      <div class="cr-info">
        <div class="cr-main">${c.pagini} pag. × ${ron(c.tarif)}/pag.</div>
        ${c.nota ? `<div class="cr-sub">📝 ${c.nota}</div>` : ""}
      </div>
      <div class="cr-amount">${ron(c.venit)}</div>
      <button class="cr-del" onclick="delClient(${c.id})">🗑</button>
    </div>
  `).join("");
}

// Render Monthly
const MO = ["Ianuarie","Februarie","Martie","Aprilie","Mai","Iunie","Iulie","August","Septembrie","Octombrie","Noiembrie","Decembrie"];

function changeMonth(d) {
  curMonth += d;
  if (curMonth > 11) { curMonth = 0; curYear++; }
  if (curMonth < 0)  { curMonth = 11; curYear--; }
  renderMonthly();
}

function renderMonthly() {
  document.getElementById("month-label").textContent = `${MO[curMonth]} ${curYear}`;
  const mk = `${curYear}-${String(curMonth+1).padStart(2,"0")}`;
  const clients = getData().filter(c => c.data.startsWith(mk));

  const nrC  = clients.length;
  const totP = clients.reduce((s,c) => s + c.pagini, 0);
  const totV = clients.reduce((s,c) => s + c.venit, 0);
  const zile = new Set(clients.map(c => c.data)).size;

  document.getElementById("monthly-stats").innerHTML = `
    <div class="ms-item"><div class="ms-val">${zile}</div><div class="ms-lbl">Zile</div></div>
    <div class="ms-item"><div class="ms-val">${nrC}</div><div class="ms-lbl">Clienți</div></div>
    <div class="ms-item"><div class="ms-val">${totP}</div><div class="ms-lbl">Pagini</div></div>
    <div class="ms-item"><div class="ms-val" style="font-size:15px">${ron(totV)}</div><div class="ms-lbl">Venit</div></div>
  `;

  const el = document.getElementById("monthly-list");
  if (!clients.length) {
    el.innerHTML = `<div class="empty-state"><div class="ei">📅</div><div class="et">Nicio activitate în această lună.</div></div>`;
    return;
  }

  const byDate = {};
  clients.forEach(c => {
    if (!byDate[c.data]) byDate[c.data] = { list:[], venit:0, pagini:0 };
    byDate[c.data].list.push(c);
    byDate[c.data].venit  += c.venit;
    byDate[c.data].pagini += c.pagini;
  });

  el.innerHTML = Object.keys(byDate).sort((a,b) => b.localeCompare(a)).map(dt => {
    const d   = new Date(dt + "T12:00:00");
    const g   = byDate[dt];
    const lbl = d.toLocaleDateString("ro-RO", { weekday:"short", day:"numeric", month:"short" });
    return `
      <div class="day-block">
        <div class="day-hdr">
          <div class="dh-left">${lbl} · ${g.list.length} client${g.list.length!==1?"ți":""}</div>
          <div class="dh-right">${ron(g.venit)}</div>
        </div>
        <div class="day-clients-wrap">
          ${g.list.map((c,i) => `
            <div class="client-row">
              <div class="cr-num">${i+1}</div>
              <div class="cr-info">
                <div class="cr-main">${c.pagini} pag. × ${ron(c.tarif)}/pag.</div>
                ${c.nota ? `<div class="cr-sub">📝 ${c.nota}</div>` : ""}
              </div>
              <div class="cr-amount">${ron(c.venit)}</div>
            </div>
          `).join("")}
        </div>
      </div>
    `;
  }).join("");
}

// Render Annual
function renderAnnual() {
  const yr = new Date().getFullYear();
  document.getElementById("year-label").textContent = yr;
  const all  = getData().filter(c => c.data.startsWith(String(yr)));
  const totV = all.reduce((s,c) => s + c.venit, 0);

  document.getElementById("grand-box").innerHTML = `
    <div class="gb-label">Total venit ${yr}</div>
    <div class="gb-val">${ron(totV)}</div>
  `;

  const mData = MO.map((name,i) => {
    const mk = `${yr}-${String(i+1).padStart(2,"0")}`;
    const me = all.filter(c => c.data.startsWith(mk));
    return { name, venit: me.reduce((s,c) => s + c.venit, 0), nr: me.length };
  });
  const maxV = Math.max(...mData.map(m => m.venit), 1);

  document.getElementById("annual-list").innerHTML = mData.map(m => `
    <div class="annual-row">
      <div class="ar-name">${m.name}</div>
      <div class="ar-bar-wrap"><div class="ar-bar" style="width:${(m.venit/maxV*100).toFixed(1)}%"></div></div>
      <div class="ar-amt">${m.venit > 0 ? ron(m.venit) : "—"}</div>
    </div>
  `).join("");
}

function ron(v) { return (v||0).toLocaleString("ro-RO",{minimumFractionDigits:0,maximumFractionDigits:2}) + " RON"; }

function showToast() {
  const t = document.getElementById("toast");
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2200);
}

function switchTab(name, btn) {
  document.querySelectorAll(".section").forEach(s => s.classList.remove("active"));
  document.querySelectorAll(".tab").forEach(b => b.classList.remove("active"));
  document.getElementById("section-"+name).classList.add("active");
  btn.classList.add("active");
}

window.addEventListener("load", () => {
  if (sessionStorage.getItem("bt_auth") === "1") {
    document.getElementById("login-screen").style.display = "none";
    document.getElementById("app-header").style.display = "block";
    document.getElementById("app-content").style.display = "block";
    initApp();
  }
});
</script>
</body>
</html>
